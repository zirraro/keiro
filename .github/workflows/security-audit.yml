name: Security — dependency audit

# CASA ASVS V10/V14 : scan automatisé des vulnérabilités de dépendances.
# Hebdomadaire (lundi) + manuel. NE FAIT PAS échouer le job (pas de mails d'échec
# à chaque push) : le résultat est publié dans le résumé + un artefact JSON.
# Le tri High/Critical sous 7 jours reste la règle (cf docs/security/
# information-security-policy.md §7) — on le lit dans le rapport hebdo.

on:
  schedule:
    - cron: '0 6 * * 1'   # lundi 06:00 UTC
  workflow_dispatch:

# Un seul run à la fois ; un nouveau annule le précédent (pas d'empilement).
concurrency:
  group: security-audit
  cancel-in-progress: true

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (no scripts)
        run: npm ci --ignore-scripts || npm install --ignore-scripts
      - name: Audit (non-blocking, résumé)
        run: |
          echo "## npm audit — $(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm audit --audit-level=high >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "(vulnérabilités détectées — voir ci-dessus, à trier sous 7 jours)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Full report (JSON)
        if: always()
        run: npm audit --json > npm-audit.json || true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 90

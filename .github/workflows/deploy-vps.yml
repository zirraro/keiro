name: Deploy to VPS

# Manual trigger only. Auto-deploy on push was failing because the
# VPS_SSH_KEY / Supabase env secrets have never been added to the repo,
# flooding the user with "deploy failed" emails. Deploy is done manually
# via SSH for now — re-enable the push trigger once the secrets are set.
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Build-time env vars (public only — secrets stay on the server)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://keiroai.com
          NEXT_PUBLIC_BASE_URL: https://keiroai.com

      # Build succeeded → deploy to VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 51.68.226.25
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            cd /opt/keiro
            echo "📥 Pulling latest..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci --production=false 2>&1 | tail -3

            echo "🔨 Building..."
            npm run build 2>&1 | tail -10

            echo "🔄 Restarting app + worker..."
            pm2 restart keiro-app || pm2 start npm --name keiro-app -- start
            pm2 restart keiro-worker || pm2 start worker/ecosystem.config.cjs
            pm2 save

            echo "✅ Deploy complete"
            pm2 list

# Hardening additions for /etc/nginx/sites-enabled/keiro
# To inject right after the ssl_certificate / ssl_certificate_key lines
# in each `listen 443` server block (both keiroai.com and www.keiroai.com).
#
# Why each line:
# - ssl_protocols: force TLSv1.2+ only. Corporate firewalls (ANSSI/banks/EU
#   compliance) actively reject sites accepting TLSv1/1.1 → likely cause of
#   the work-browser block on keiroai.com.
# - ssl_ciphers: modern strong list, ECDHE + AES-GCM/ChaCha20 only.
# - ssl_prefer_server_ciphers: off so client picks the strongest mutually-OK.
# - ssl_session_*: session resumption + no tickets (forward secrecy).
# - ssl_stapling: OCSP stapling = faster TLS handshake + cert revocation check.
# - ssl_dhparam: 2048-bit DH params for Forward Secrecy.
# - SSL Labs grade A+ when applied.

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";

ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 1.0.0.1 valid=300s;
resolver_timeout 5s;

# Browser-facing security headers (extra to what Next.js sends).
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
